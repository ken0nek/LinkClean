    <g fill="none" stroke="#000" stroke-width="1.7" stroke-linecap="round">
      <rect x="2.55" y="10.4" width="9.5" height="6.2" rx="3.1"/>
      <rect x="8.95" y="10.4" width="9.5" height="6.2" rx="3.1"/>
    </g>
  </g>
  <!-- Sparkle, clear in the top-right corner (the "clean" cue). -->
  <path d="M19.8 3.0 Q19.8 5.4 22.2 5.4 Q19.8 5.4 19.8 7.8 Q19.8 5.4 17.4 5.4 Q19.8 5.4 19.8 3.0 Z" fill="#000"/>
</svg>
