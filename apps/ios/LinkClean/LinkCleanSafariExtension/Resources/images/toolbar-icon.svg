<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Diagonal two-link chain (echoes the app mark), two capsule rings offset
       along their axis and rotated -45 so it reads as a link at toolbar size. -->
